<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#f5f7fa" media="(prefers-color-scheme: light)">
    <meta name="theme-color" content="#1a1a2e" media="(prefers-color-scheme: dark)">
    <title>FAQ - Bildergalerie</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="faq.css">
</head>
<body>
    <div id="faq-page">
        <header class="admin-header">
            <div class="header-top">
                <div class="header-title">
                    <img src="onewheel-header-logo.png" class="header-logo" alt="" aria-hidden="true" width="50" height="50">
                    <h1>Häufig gestellte Fragen (FAQ)</h1>
                </div>
                <nav class="header-controls" aria-label="Hauptnavigation">
                    <button id="back-to-gallery-btn" class="btn-nav">Galerie</button>
                    <button id="medien-nav-btn" class="btn-nav hidden">Medien</button>
                    <button id="admin-nav-btn" class="btn-nav hidden">Admin</button>
                    <button id="faq-nav-btn" class="btn-nav active" aria-current="page">FAQ</button>
                    <button id="dark-mode-toggle" class="btn-dark-mode" aria-label="Dunkelmodus umschalten" title="Dunkelmodus umschalten">
                        <span class="dark-mode-icon" aria-hidden="true"></span>
                    </button>
                    <div class="user-menu">
                        <button id="faq-user-menu-btn" class="user-menu-btn" aria-haspopup="true" aria-expanded="false">
                            <span id="faq-user-info"></span>
                            <span class="dropdown-arrow" aria-hidden="true">▼</span>
                        </button>
                        <div id="faq-user-dropdown" class="user-dropdown hidden" role="menu">
                            <button id="faq-change-password-btn" class="dropdown-item" role="menuitem">
                                <span class="dropdown-icon dropdown-icon--key" aria-hidden="true"></span> Passwort ändern
                            </button>
                            <button id="faq-logout-btn" class="dropdown-item" role="menuitem">
                                <span class="dropdown-icon dropdown-icon--logout" aria-hidden="true"></span> Abmelden
                            </button>
                        </div>
                    </div>
                </nav>
            </div>
        </header>

        <div class="faq-content">
            <div class="faq-toolbar">
                <h2>Häufig gestellte Fragen</h2>
                <button id="create-faq-btn" class="btn-primary hidden">+ Neue Frage</button>
            </div>

            <div class="faq-search-wrapper">
                <label for="faq-search-input" class="visually-hidden">Fragen durchsuchen</label>
                <input type="search"
                       id="faq-search-input"
                       name="faq-search"
                       class="faq-search-input"
                       placeholder="Fragen durchsuchen…"
                       autocomplete="off"
                       spellcheck="false">
                <button type="button"
                        id="faq-search-clear"
                        class="faq-search-clear hidden"
                        aria-label="Suche zurücksetzen">&times;</button>
            </div>

            <div id="faq-categories" class="faq-categories hidden" role="tablist" aria-label="FAQ-Kategorien"></div>

            <div id="faq-loading" class="loading hidden" role="status" aria-live="polite">Lade FAQ…</div>
            <div id="faq-error" class="error-message" role="alert" aria-live="polite"></div>
            <div id="faq-list" class="faq-list"></div>
            <div id="faq-no-results" class="no-faq hidden">
                <p>Keine Ergebnisse</p>
            </div>
            <div id="no-faq" class="no-faq hidden">
                <p>Keine FAQ-Einträge vorhanden.</p>
            </div>
        </div>
    </div>

    <!-- FAQ Modal -->
    <div id="faq-modal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="faq-modal-title">
        <div class="modal-content">
            <button type="button" class="close-modal" data-modal="faq-modal" aria-label="Schließen">&times;</button>
            <h2 id="faq-modal-title">Neue Frage</h2>

            <form id="faq-form">
                <div class="form-group">
                    <label for="faq-question">Frage *</label>
                    <input type="text" id="faq-question" name="question" required
                           autocomplete="off"
                           placeholder="z.&nbsp;B. Wie kann ich Bilder hochladen?">
                </div>

                <div class="form-group">
                    <label for="faq-answer">Antwort *</label>
                    <textarea id="faq-answer" name="answer" required rows="6"
                              placeholder="Geben Sie hier die Antwort ein…"></textarea>
                    <small class="faq-markdown-hint">Markdown: <code>**fett**</code>, <code>*kursiv*</code>, <code>`code`</code>, <code>[Link](url)</code>, Listen mit <code>-</code></small>
                </div>

                <div class="form-group">
                    <label for="faq-category">Kategorie (optional)</label>
                    <input type="text" id="faq-category" name="category"
                           autocomplete="off"
                           placeholder="z.&nbsp;B. Allgemein, Upload, Bedienung">
                    <small>Gruppiert FAQ-Einträge nach Themen</small>
                </div>

                <div class="form-group">
                    <label for="faq-order">Reihenfolge</label>
                    <input type="number" inputmode="numeric" id="faq-order" name="order" value="0" min="0">
                    <small>Niedrigere Zahlen werden zuerst angezeigt</small>
                </div>

                <div class="form-actions">
                    <button type="button" class="btn-secondary cancel-btn" data-modal="faq-modal">
                        Abbrechen
                    </button>
                    <button type="submit" class="btn-primary">Speichern</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Confirmation Modal -->
    <div id="confirm-modal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="confirm-title" aria-describedby="confirm-message">
        <div class="modal-content">
            <h2 id="confirm-title">Bestätigung</h2>
            <p id="confirm-message"></p>
            <div class="form-actions">
                <button id="confirm-cancel" class="btn-secondary">Abbrechen</button>
                <button id="confirm-ok" class="btn-primary">OK</button>
            </div>
        </div>
    </div>

    <script src="dark-mode.js"></script>
    <script src="faq.js"></script>
</body>
</html>

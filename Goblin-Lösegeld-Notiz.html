<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Goblin Lösegeld-Notiz</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Caveat:wght@700&display=swap');

        body {
            margin: 0;
            padding: 20px;
            background: linear-gradient(135deg, #2d1b00 0%, #4a3728 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Caveat', cursive;
        }

        .note-container {
            background: #e8d4a0;
            width: 500px;
            padding: 40px;
            border: 3px solid #3d2817;
            border-radius: 5px;
            box-shadow:
                0 10px 30px rgba(0, 0, 0, 0.5),
                inset 0 0 20px rgba(0, 0, 0, 0.1);
            position: relative;
            transform: rotate(-1deg);
        }

        .note-container::before {
            content: '';
            position: absolute;
            top: -10px;
            left: 50%;
            transform: translateX(-50%);
            width: 60px;
            height: 20px;
            background: #8b6f47;
            border-radius: 3px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.3);
        }

        .stain {
            position: absolute;
            background: rgba(100, 70, 30, 0.3);
            border-radius: 50%;
        }

        .stain-1 {
            width: 80px;
            height: 80px;
            top: 20px;
            right: 30px;
        }

        .stain-2 {
            width: 50px;
            height: 50px;
            bottom: 40px;
            left: 40px;
        }

        .stain-3 {
            width: 30px;
            height: 30px;
            top: 120px;
            left: 60px;
        }

        .tear {
            position: absolute;
            width: 0;
            height: 0;
            border-left: 15px solid transparent;
            border-right: 15px solid transparent;
            border-bottom: 20px solid #e8d4a0;
            bottom: -3px;
            right: 80px;
            transform: rotate(-25deg);
        }

        h1 {
            font-size: 48px;
            color: #2d1b00;
            text-align: center;
            margin: 0 0 30px 0;
            text-shadow: 2px 2px 0px rgba(0, 0, 0, 0.1);
            letter-spacing: 3px;
            transform: rotate(-2deg);
        }

        .message {
            font-size: 36px;
            color: #3d2817;
            line-height: 1.6;
            margin: 30px 0;
            text-align: left;
            position: relative;
            z-index: 1;
        }

        .message .emphasis {
            font-size: 42px;
            font-weight: bold;
            color: #8b0000;
            text-decoration: underline wavy #8b0000;
        }

        .signature {
            font-size: 32px;
            color: #2d1b00;
            text-align: right;
            margin-top: 40px;
            font-weight: bold;
            transform: rotate(3deg);
        }

        .signature::before {
            content: '- ';
        }

        .paw-print {
            position: absolute;
            bottom: 30px;
            left: 50px;
            width: 40px;
            height: 40px;
            background: rgba(139, 0, 0, 0.4);
            border-radius: 50%;
        }

        .paw-print::before,
        .paw-print::after {
            content: '';
            position: absolute;
            background: rgba(139, 0, 0, 0.4);
            border-radius: 50%;
        }

        .paw-print::before {
            width: 15px;
            height: 15px;
            top: -8px;
            left: 5px;
        }

        .paw-print::after {
            width: 15px;
            height: 15px;
            top: -8px;
            right: 5px;
        }

        .fingerprint {
            position: absolute;
            top: 30px;
            right: 40px;
            width: 60px;
            height: 80px;
            background:
                radial-gradient(ellipse at center, transparent 30%, rgba(100, 70, 30, 0.3) 31%, rgba(100, 70, 30, 0.3) 35%, transparent 36%),
                radial-gradient(ellipse at center, transparent 40%, rgba(100, 70, 30, 0.3) 41%, rgba(100, 70, 30, 0.3) 45%, transparent 46%),
                radial-gradient(ellipse at center, transparent 50%, rgba(100, 70, 30, 0.3) 51%, rgba(100, 70, 30, 0.3) 55%, transparent 56%);
            border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
            transform: rotate(-20deg);
            opacity: 0.7;
        }

        .scribble {
            position: absolute;
            bottom: 60px;
            right: 50px;
            font-size: 24px;
            color: rgba(139, 0, 0, 0.4);
            transform: rotate(-15deg);
        }

        @media print {
            body {
                background: white;
            }
            .note-container {
                box-shadow: none;
                border: 2px solid #3d2817;
            }
        }
    </style>
</head>
<body>
    <div class="note-container">
        <!-- Flecken und Beschädigungen -->
        <div class="stain stain-1"></div>
        <div class="stain stain-2"></div>
        <div class="stain stain-3"></div>
        <div class="tear"></div>
        <div class="fingerprint"></div>
        <div class="paw-print"></div>

        <!-- Inhalt -->
        <h1>ACHTUNG!</h1>

        <div class="message">
            KAZE IST <span class="emphasis">UNSER</span>!<br>
            <br>
            WIL <span class="emphasis">50 GOLD</span><br>
            ODER KAZE WIRD<br>
            <span class="emphasis">ABEN ESSEN!</span>
        </div>

        <div class="signature">
            Griznok,<br>
            Katzenfänger-Boss
        </div>

        <div class="scribble">
            GRIZNOK<br>
            GRÖSSTE!
        </div>
    </div>
</body>
</html>
